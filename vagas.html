<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Vagas - ZyoKedln</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="index.html">
ZyoKedln
</a>

<div>

<a class="btn btn-outline-light me-2" href="vagas.html">
Ver vagas
</a>

<a class="btn btn-success" href="divulgar.html">
Divulgar emprego
</a>

</div>

</div>
</nav>

<div class="container mt-5">

<h2 class="mb-4">
Vagas disponíveis
</h2>

<div class="row" id="listaVagas"></div>

</div>

<script>

let vagas = JSON.parse(localStorage.getItem("vagas")) || [];

let lista = document.getElementById("listaVagas");

if(vagas.length === 0){

lista.innerHTML = `
<div class="col-12">
<div class="alert alert-dark">
Nenhuma vaga publicada ainda.
</div>
</div>
`;

}

vagas.forEach(function(vaga){

lista.innerHTML += `

<div class="col-md-6">

<div class="card shadow mb-4" onclick="abrirCandidatura()"
style="cursor:pointer;">

<div class="card-body">

<h4>${vaga.cargo}</h4>

<p>
 ${vaga.empresa}
</p>

<p>
 ${vaga.salario}
</p>

<p>
${vaga.descricao}
</p>

</div>

</div>

</div>

`;

});

function abrirCandidatura(){

window.location.href = "candidatar.html";

}

</script>

</body>
</html>
