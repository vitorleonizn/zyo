<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Divulgar Vaga - ZyoKedln</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="index.html">ZyoKedln</a>
</div>
</nav>

<div class="container mt-5">

<h2 class="mb-4">Divulgar nova vaga</h2>

<form onsubmit="publicarVaga(event)">

<div class="mb-3">
<label class="form-label">Nome da Empresa</label>
<input type="text" id="empresa" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Cargo</label>
<input type="text" id="cargo" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Salário</label>
<input type="text" id="salario" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Descrição da vaga</label>
<textarea id="descricao" class="form-control" required></textarea>
</div>

<button class="btn btn-success">
Publicar vaga
</button>

</form>

</div>

<script src="js/script.js"></script>

</body>
</html>
